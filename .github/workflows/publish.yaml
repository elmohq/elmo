# Manual release workflow - triggered via workflow_dispatch

# Prerequisites:
# 1. Run `pnpm changeset` locally to create changeset files
# 2. Run `pnpm version-packages` to bump versions and generate changelogs
# 3. Commit and push the version changes to main
# 4. Trigger this workflow from GitHub Actions UI

# Required secrets:
# - NPM_TOKEN: npm access token with publish permissions
# - DOCKERHUB_USERNAME: Docker Hub username
# - DOCKERHUB_TOKEN: Docker Hub access token

name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./apps/cli/package.json').version")" >> $GITHUB_OUTPUT

      - name: Publish packages
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create aggregated GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node scripts/generate-release-notes.mjs "$VERSION" > release-notes.md
          gh release create "v$VERSION" --title "v$VERSION" --notes-file release-notes.md

  docker-build:
    name: Build images (${{ matrix.arch }})
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: blacksmith-4vcpu-ubuntu-2404
            arch: amd64
          - platform: linux/arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image by digest
        id: build-web
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: docker/Dockerfile
          target: web
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=elmohq/elmo-web,push-by-digest=true,name-canonical=true,push=true

      - name: Build and push worker image by digest
        id: build-worker
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: docker/Dockerfile
          target: worker
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=elmohq/elmo-worker,push-by-digest=true,name-canonical=true,push=true

      - name: Build and push db-migrate image by digest
        id: build-db-migrate
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: docker/Dockerfile
          target: migrate
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=elmohq/elmo-db-migrate,push-by-digest=true,name-canonical=true,push=true

      - name: Export digests
        env:
          WEB_DIGEST: ${{ steps.build-web.outputs.digest }}
          WORKER_DIGEST: ${{ steps.build-worker.outputs.digest }}
          DB_MIGRATE_DIGEST: ${{ steps.build-db-migrate.outputs.digest }}
        run: |
          mkdir -p /tmp/digests/web /tmp/digests/worker /tmp/digests/db-migrate
          touch "/tmp/digests/web/${WEB_DIGEST#sha256:}"
          touch "/tmp/digests/worker/${WORKER_DIGEST#sha256:}"
          touch "/tmp/digests/db-migrate/${DB_MIGRATE_DIGEST#sha256:}"

      - name: Upload digests
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Publish multi-arch manifests
    needs: [release, docker-build]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch web manifest
        working-directory: /tmp/digests/web
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "elmohq/elmo-web:${VERSION}" \
            -t "elmohq/elmo-web:latest" \
            $(printf 'elmohq/elmo-web@sha256:%s ' *)

      - name: Create multi-arch worker manifest
        working-directory: /tmp/digests/worker
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "elmohq/elmo-worker:${VERSION}" \
            -t "elmohq/elmo-worker:latest" \
            $(printf 'elmohq/elmo-worker@sha256:%s ' *)

      - name: Create multi-arch db-migrate manifest
        working-directory: /tmp/digests/db-migrate
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "elmohq/elmo-db-migrate:${VERSION}" \
            -t "elmohq/elmo-db-migrate:latest" \
            $(printf 'elmohq/elmo-db-migrate@sha256:%s ' *)
