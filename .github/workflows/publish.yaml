# Manual release workflow - triggered via workflow_dispatch

# Prerequisites:
# 1. Run `pnpm changeset` locally to create changeset files
# 2. Run `pnpm version-packages` to bump versions and generate changelogs
# 3. Commit and push the version changes to main
# 4. Trigger this workflow from GitHub Actions UI

# Required secrets:
# - NPM_TOKEN: npm access token with publish permissions
# - DOCKERHUB_USERNAME: Docker Hub username
# - DOCKERHUB_TOKEN: Docker Hub access token
# - Provider keys (for integration tests): SCRAPE_TARGETS, OLOSTEP_API_KEY, etc.

name: Release

on:
  workflow_dispatch:

jobs:
  test-providers:
    name: Provider Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write .env for test script
        working-directory: apps/web
        run: |
          cat <<'EOF' > .env
          OLOSTEP_API_KEY=${{ secrets.OLOSTEP_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          DATAFORSEO_LOGIN=${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD=${{ secrets.DATAFORSEO_PASSWORD }}
          BRIGHTDATA_API_TOKEN=${{ secrets.BRIGHTDATA_API_TOKEN }}
          SCRAPE_TARGETS=${{ secrets.SCRAPE_TARGETS }}
          EOF

      - name: Run provider integration tests
        working-directory: apps/web
        run: pnpm tsx --env-file=.env scripts/test-providers.ts

  release:
    name: Release
    needs: [test-providers]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./apps/cli/package.json').version")" >> $GITHUB_OUTPUT

      - name: Publish and create GitHub releases
        uses: changesets/action@v1
        with:
          publish: pnpm release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: web
          push: true
          tags: |
            elmohq/elmo-web:${{ steps.version.outputs.version }}
            elmohq/elmo-web:latest
          cache-from: |
            type=gha,scope=web
            type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: worker
          push: true
          tags: |
            elmohq/elmo-worker:${{ steps.version.outputs.version }}
            elmohq/elmo-worker:latest
          cache-from: |
            type=gha,scope=web
            type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
