# End-to-End Integration Tests
#
# Verifies the open source local deployment works end-to-end.
# Walks through the `elmo init --dev` CLI flow in CI mode, starts services
# via Docker Compose (skipping worker to avoid execution costs),
# seeds test data, and runs Playwright tests against the Dockerized web app.
#
# This workflow is the SINGLE SOURCE OF TRUTH for E2E test orchestration.
# Run locally via: pnpm test:e2e  (uses https://github.com/nektos/act)

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Integration Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # NB: no free-disk-space step here — it predated the Blacksmith migration
      # and is unnecessary on these runners (publish.yaml builds the same
      # Dockerfile without it). We also deliberately do NOT use a buildx
      # sticky-disk builder: `docker compose build` doesn't wire up its cache,
      # and the container driver would serialize each image to load it back into
      # the local daemon for `up` — that export/import tax outweighs any cache
      # savings for this build-and-run-locally job. The default driver builds
      # straight into the daemon's image store.

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm turbo check-types

      - name: Unit tests
        run: pnpm turbo test

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm -C apps/web exec playwright install chromium --with-deps

      - name: Storybook tests
        run: pnpm -C apps/web test:storybook

      - name: Build elmo CLI
        run: pnpm -C apps/cli build

      - name: "Run: elmo init --dev (via cli-driver)"
        run: |
          mkdir -p e2e/.elmo
          cd e2e
          npx tsx cli-driver.ts "$PWD/.elmo" "$GITHUB_WORKSPACE"

      - name: Patch .env with test overrides
        run: |
          cat >> e2e/.elmo/.env <<'PATCH'

          # E2E test overrides
          ADMIN_API_KEYS=test-api-key-e2e
          E2E_FAKE_ANALYZE=1
          PATCH

      - name: Show generated config
        run: |
          echo "=== .env ==="
          cat e2e/.elmo/.env
          echo ""
          echo "=== elmo.yaml (services) ==="
          grep -E '^\s{2}\w' e2e/.elmo/elmo.yaml || true

      # Build all images so a broken worker (or db-migrate) Dockerfile fails CI
      # here, even though we don't run the worker. web/worker/migrate share the
      # base/deps/builder stages, so BuildKit builds those once — building all
      # three costs little more than building web alone. postgres is an image
      # pull, so `build` skips it.
      - name: Build images
        run: docker compose -f e2e/.elmo/elmo.yaml build

      # Start only web and its deps (db-migrate, postgres). The worker is
      # intentionally not started (we skip it to avoid execution costs); it was
      # only ever started to be immediately stopped, which gave no runtime
      # safety, so we just don't start it.
      - name: Start services
        run: docker compose -f e2e/.elmo/elmo.yaml up -d --no-build web

      - name: Wait for web
        run: |
          echo "Waiting for web to be ready on http://localhost:1515..."
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:1515/ 2>/dev/null; then
              echo "Web is ready."
              exit 0
            fi
            sleep 3
          done
          echo "ERROR: Web did not become ready in time."
          docker compose -f e2e/.elmo/elmo.yaml logs
          exit 1

      - name: Seed test data
        run: cd e2e && npx tsx seed.ts

      - name: Run Playwright E2E tests
        run: pnpm test:e2e

      - name: Run Bruno API tests
        run: pnpm test:api

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 7
