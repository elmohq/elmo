# CLA Check
#
# Verifies that the author of every pull request has signed the CLA, either
# previously (already listed in .github/contributors.txt on the base branch)
# or in this same PR (the PR adds the author to contributors.txt and the PR
# body contains the agreement statement).
#
# Security model: this workflow runs as pull_request_target, so the workflow
# file itself comes from the trusted base branch and cannot be modified by a
# fork PR. We do NOT check out the PR head into the workspace. The head
# version of contributors.txt is fetched read-only via the GitHub API, and
# we only credit the file's contents if they include the PR author's own
# username — a fork cannot add someone else and claim they signed.
#
# Org members, repo collaborators, the repo owner, and bot accounts are
# exempt.

name: CLA Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cla:
    name: Verify CLA signature
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout base ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Verify signer
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
          AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
          ASSOCIATION: ${{ github.event.pull_request.author_association }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          author_lower="$(echo "$AUTHOR" | tr '[:upper:]' '[:lower:]')"

          # ── Exemptions ────────────────────────────────────────────────

          # Any GitHub App / bot account (dependabot[bot], renovate[bot], etc.)
          if [ "$AUTHOR_TYPE" = "Bot" ]; then
            echo "Bot account $AUTHOR is exempt from CLA check."
            exit 0
          fi
          case "$author_lower" in
            'dependabot[bot]'|'github-actions[bot]'|'renovate[bot]'|dependabot|renovate)
              echo "Bot account $AUTHOR is exempt from CLA check."
              exit 0
              ;;
          esac

          # Org members, repo collaborators, and the repo owner
          case "$ASSOCIATION" in
            OWNER|MEMBER|COLLABORATOR)
              echo "$AUTHOR ($ASSOCIATION) is exempt from CLA check."
              exit 0
              ;;
          esac

          # ── Helper: does a file list the author? ──────────────────────
          contains_author() {
            local file="$1"
            [ -f "$file" ] || return 1
            awk '
              { sub(/#.*$/, ""); gsub(/[[:space:]]/, "") }
              tolower($0) == author { found = 1 }
              END { exit found ? 0 : 1 }
            ' author="$author_lower" "$file"
          }

          # ── Already signed on base branch? ────────────────────────────
          if contains_author .github/contributors.txt; then
            echo "$AUTHOR has previously signed the CLA."
            exit 0
          fi

          # ── Otherwise: is the author signing in this same PR? ─────────
          # Fetch contributors.txt from the PR head via the API. We do NOT
          # check out the PR head into the workspace.
          mkdir -p /tmp/cla
          if ! gh api \
              "repos/$GITHUB_REPOSITORY/contents/.github/contributors.txt?ref=$PR_HEAD_SHA" \
              --jq .content 2>/dev/null \
              | base64 -d > /tmp/cla/head-contributors.txt; then
            echo "::error::$AUTHOR has not signed the CLA. See CLA.md for instructions."
            exit 1
          fi

          if contains_author /tmp/cla/head-contributors.txt; then
            # The header of contributors.txt explicitly states that adding
            # your username to the file constitutes agreement to the CLA,
            # so the file edit itself is the signature.
            echo "$AUTHOR is signing the CLA in this PR (added to contributors.txt)."
            exit 0
          fi

          echo "::error::$AUTHOR has not signed the CLA. See CLA.md for instructions."
          exit 1
