name: Provider Integration Tests
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - "release/**"
      - "release-*"

jobs:
  test-providers:
    name: Provider ping check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write .env for script
        working-directory: apps/web
        run: |
          cat <<'EOF' > .env
          OLOSTEP_API_KEY=${{ secrets.OLOSTEP_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          DATAFORSEO_LOGIN=${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD=${{ secrets.DATAFORSEO_PASSWORD }}
          BRIGHTDATA_API_KEY=${{ secrets.BRIGHTDATA_API_KEY }}
          SCRAPE_TARGETS=${{ secrets.SCRAPE_TARGETS }}
          EOF

      - name: Run provider ping tests
        working-directory: apps/web
        run: pnpm tsx --env-file=.env scripts/test-providers.ts --ping
