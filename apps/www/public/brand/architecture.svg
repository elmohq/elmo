<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" font-family="'Geist Sans', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#71717a"/>
    </marker>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1f23"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4a261"/>
      <stop offset="100%" stop-color="#ee964b"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1100" height="460" rx="16" fill="#09090b"/>

  <!-- ELMO subgraph -->
  <rect x="220" y="80" width="440" height="320" rx="14" fill="url(#cardGrad)"
        stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="240" y="108" fill="#a1a1aa" font-size="11" font-weight="600" letter-spacing="3.5">ELMO</text>

  <!-- LLM APIs group -->
  <rect x="720" y="90" width="360" height="140" rx="14" fill="url(#cardGrad)"
        stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="740" y="118" fill="#a1a1aa" font-size="11" font-weight="600" letter-spacing="3.5">LLM APIs</text>

  <!-- LLM Scrapers group -->
  <rect x="720" y="250" width="360" height="140" rx="14" fill="url(#cardGrad)"
        stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="740" y="278" fill="#a1a1aa" font-size="11" font-weight="600" letter-spacing="3.5">LLM SCRAPERS</text>

  <!-- Connectors -->
  <line x1="162" y1="160" x2="248" y2="160" stroke="#71717a" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Diagonal: Postgres ↔ Elmo (entering at Elmo vertical center) -->
  <line x1="148" y1="305" x2="218" y2="244" stroke="#71717a" stroke-width="2"
        marker-start="url(#arr)" marker-end="url(#arr)"/>
  <path d="M 632 320 C 660 320, 650 160, 675 160" stroke="#71717a" stroke-width="2" fill="none"/>
  <line x1="632" y1="160" x2="718" y2="160" stroke="#71717a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="632" y1="320" x2="718" y2="320" stroke="#71717a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- User -->
  <rect x="20" y="130" width="140" height="60" rx="30" fill="url(#userGrad)" filter="url(#sh)"/>
  <text x="90" y="166" text-anchor="middle" fill="white" font-size="15" font-weight="600">User</text>

  <!-- Postgres cylinder -->
  <g filter="url(#sh)">
    <ellipse cx="90" cy="350" rx="58" ry="11" fill="url(#dbGrad)"/>
    <rect x="32" y="290" width="116" height="60" fill="url(#dbGrad)"/>
    <ellipse cx="90" cy="290" rx="58" ry="11" fill="url(#dbGrad)"/>
  </g>
  <ellipse cx="90" cy="290" rx="58" ry="11" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <path d="M 32 350 A 58 11 0 0 0 148 350" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <text x="90" y="326" text-anchor="middle" fill="white" font-size="14" font-weight="600">Postgres</text>

  <!-- Web Server -->
  <rect x="250" y="130" width="380" height="60" rx="10" fill="url(#brandGrad)" filter="url(#sh)"/>
  <text x="440" y="166" text-anchor="middle" fill="white" font-size="15" font-weight="600">Web Server</text>

  <!-- Worker -->
  <rect x="250" y="290" width="380" height="60" rx="10" fill="url(#brandGrad)" filter="url(#sh)"/>
  <text x="440" y="326" text-anchor="middle" fill="white" font-size="15" font-weight="600">Worker</text>

  <!-- LLM API chips: each has a small provider-color dot before the name -->
  <g>
    <rect x="736" y="140" width="160" height="32" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="752" cy="156" r="4" fill="#a855f7"/>
    <text x="764" y="161" fill="#fafafa" font-size="13" font-weight="500">OpenRouter</text>

    <rect x="904" y="140" width="160" height="32" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="920" cy="156" r="4" fill="#f59e0b"/>
    <text x="932" y="161" fill="#fafafa" font-size="13" font-weight="500">Anthropic</text>

    <rect x="736" y="184" width="160" height="32" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="752" cy="200" r="4" fill="#10b981"/>
    <text x="764" y="205" fill="#fafafa" font-size="13" font-weight="500">OpenAI</text>

    <rect x="904" y="184" width="160" height="32" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="920" cy="200" r="4" fill="#fa6c00"/>
    <text x="932" y="205" fill="#fafafa" font-size="13" font-weight="500">Mistral</text>
  </g>

  <!-- LLM Scraper chips -->
  <g>
    <rect x="736" y="300" width="160" height="32" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="752" cy="316" r="4" fill="#10b981"/>
    <text x="764" y="321" fill="#fafafa" font-size="13" font-weight="500">ChatGPT</text>

    <rect x="904" y="300" width="160" height="32" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="920" cy="316" r="4" fill="#3b82f6"/>
    <text x="932" y="321" fill="#fafafa" font-size="13" font-weight="500">Google AI Mode</text>

    <rect x="736" y="344" width="160" height="32" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="752" cy="360" r="4" fill="#8b5cf6"/>
    <text x="764" y="365" fill="#fafafa" font-size="13" font-weight="500">Perplexity</text>

    <rect x="904" y="344" width="160" height="32" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="920" cy="360" r="4" fill="#a1a1aa"/>
    <text x="932" y="365" fill="#fafafa" font-size="13" font-weight="500">Grok</text>
  </g>
</svg>
