<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#101427"/>
      <stop offset="100%" stop-color="#0a0d1c"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="svcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="extGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1100" height="460" rx="20" fill="url(#bgGrad)"/>

  <!-- ELMO subgraph -->
  <rect x="220" y="80" width="440" height="320" rx="16" fill="#171b2e" stroke="#2d3553" stroke-width="1.5"/>
  <text x="240" y="108" fill="#94a3b8" font-size="12" font-weight="700" letter-spacing="3">ELMO</text>

  <!-- LLM APIs group -->
  <rect x="720" y="90" width="360" height="140" rx="14" fill="#171b2e" stroke="#2d3553" stroke-width="1.5"/>
  <text x="740" y="118" fill="#94a3b8" font-size="12" font-weight="700" letter-spacing="3">LLM APIs</text>

  <!-- LLM Scrapers group -->
  <rect x="720" y="250" width="360" height="140" rx="14" fill="#171b2e" stroke="#2d3553" stroke-width="1.5"/>
  <text x="740" y="278" fill="#94a3b8" font-size="12" font-weight="700" letter-spacing="3">LLM SCRAPERS</text>

  <!-- Connectors (drawn before nodes so cards overlay) -->
  <line x1="162" y1="160" x2="248" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="148" y1="320" x2="218" y2="320" stroke="#94a3b8" stroke-width="2"
        marker-start="url(#arr)" marker-end="url(#arr)"/>
  <path d="M 632 320 C 660 320, 650 160, 675 160" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <line x1="632" y1="160" x2="718" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="632" y1="320" x2="718" y2="320" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- User -->
  <rect x="20" y="130" width="140" height="60" rx="30" fill="url(#userGrad)" filter="url(#sh)"/>
  <text x="90" y="166" text-anchor="middle" fill="white" font-size="16" font-weight="600">User</text>

  <!-- Postgres cylinder -->
  <g filter="url(#sh)">
    <ellipse cx="90" cy="350" rx="58" ry="11" fill="url(#dbGrad)"/>
    <rect x="32" y="290" width="116" height="60" fill="url(#dbGrad)"/>
    <ellipse cx="90" cy="290" rx="58" ry="11" fill="url(#dbGrad)"/>
  </g>
  <ellipse cx="90" cy="290" rx="58" ry="11" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>
  <path d="M 32 350 A 58 11 0 0 0 148 350" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <text x="90" y="326" text-anchor="middle" fill="white" font-size="15" font-weight="600">Postgres</text>

  <!-- Web Server -->
  <rect x="250" y="130" width="380" height="60" rx="10" fill="url(#svcGrad)" filter="url(#sh)"/>
  <text x="440" y="166" text-anchor="middle" fill="white" font-size="15" font-weight="600">Web Server</text>

  <!-- Worker -->
  <rect x="250" y="290" width="380" height="60" rx="10" fill="url(#svcGrad)" filter="url(#sh)"/>
  <text x="440" y="326" text-anchor="middle" fill="white" font-size="15" font-weight="600">Worker</text>

  <!-- LLM API chips -->
  <rect x="736" y="140" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="816" y="161" text-anchor="middle" fill="white" font-size="13" font-weight="600">OpenRouter</text>
  <rect x="904" y="140" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="984" y="161" text-anchor="middle" fill="white" font-size="13" font-weight="600">Anthropic</text>
  <rect x="736" y="184" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="816" y="205" text-anchor="middle" fill="white" font-size="13" font-weight="600">OpenAI</text>
  <rect x="904" y="184" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="984" y="205" text-anchor="middle" fill="white" font-size="13" font-weight="600">Mistral</text>

  <!-- LLM Scraper chips -->
  <rect x="736" y="300" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="816" y="321" text-anchor="middle" fill="white" font-size="13" font-weight="600">ChatGPT</text>
  <rect x="904" y="300" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="984" y="321" text-anchor="middle" fill="white" font-size="13" font-weight="600">Google AI Mode</text>
  <rect x="736" y="344" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="816" y="365" text-anchor="middle" fill="white" font-size="13" font-weight="600">Perplexity</text>
  <rect x="904" y="344" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="984" y="365" text-anchor="middle" fill="white" font-size="13" font-weight="600">Grok</text>
</svg>
