<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#101427"/>
      <stop offset="100%" stop-color="#0a0d1c"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="svcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="extGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1100" height="540" rx="20" fill="url(#bgGrad)"/>

  <!-- ELMO subgraph -->
  <rect x="220" y="80" width="440" height="380" rx="16" fill="#171b2e" stroke="#2d3553" stroke-width="1.5"/>
  <text x="240" y="108" fill="#94a3b8" font-size="12" font-weight="700" letter-spacing="3">ELMO</text>

  <!-- LLM APIs group -->
  <rect x="720" y="80" width="360" height="150" rx="14" fill="#171b2e" stroke="#2d3553" stroke-width="1.5"/>
  <text x="740" y="108" fill="#94a3b8" font-size="12" font-weight="700" letter-spacing="3">LLM APIs</text>

  <!-- LLM Scrapers group -->
  <rect x="720" y="310" width="360" height="150" rx="14" fill="#171b2e" stroke="#2d3553" stroke-width="1.5"/>
  <text x="740" y="338" fill="#94a3b8" font-size="12" font-weight="700" letter-spacing="3">LLM SCRAPERS</text>

  <!-- Connectors (drawn before nodes so cards overlay) -->

  <!-- User → Web Server -->
  <line x1="162" y1="155" x2="248" y2="155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Postgres ↔ ELMO -->
  <line x1="148" y1="270" x2="218" y2="270" stroke="#94a3b8" stroke-width="2"
        marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- Worker tributary that merges into the Web Server → LLM APIs line -->
  <path d="M 632 385 C 660 385, 660 155, 685 155" stroke="#94a3b8" stroke-width="2" fill="none"/>

  <!-- Web Server (and merged Worker) → LLM APIs -->
  <line x1="632" y1="155" x2="718" y2="155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- merge dot -->
  <circle cx="685" cy="155" r="3.5" fill="#94a3b8"/>

  <!-- Worker → LLM Scrapers -->
  <line x1="632" y1="385" x2="718" y2="385" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- User -->
  <rect x="20" y="125" width="140" height="60" rx="30" fill="url(#userGrad)" filter="url(#sh)"/>
  <text x="90" y="161" text-anchor="middle" fill="white" font-size="16" font-weight="600">User</text>

  <!-- Postgres cylinder (drawn bottom-up: bottom ellipse, body, top ellipse) -->
  <g filter="url(#sh)">
    <ellipse cx="90" cy="300" rx="58" ry="11" fill="url(#dbGrad)"/>
    <rect x="32" y="240" width="116" height="60" fill="url(#dbGrad)"/>
    <ellipse cx="90" cy="240" rx="58" ry="11" fill="url(#dbGrad)"/>
  </g>
  <ellipse cx="90" cy="240" rx="58" ry="11" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>
  <path d="M 32 300 A 58 11 0 0 0 148 300" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <text x="90" y="276" text-anchor="middle" fill="white" font-size="15" font-weight="600">Postgres</text>

  <!-- Web Server -->
  <rect x="250" y="125" width="380" height="60" rx="10" fill="url(#svcGrad)" filter="url(#sh)"/>
  <text x="440" y="161" text-anchor="middle" fill="white" font-size="15" font-weight="600">Web Server</text>

  <!-- Worker -->
  <rect x="250" y="355" width="380" height="60" rx="10" fill="url(#svcGrad)" filter="url(#sh)"/>
  <text x="440" y="391" text-anchor="middle" fill="white" font-size="15" font-weight="600">Worker</text>

  <!-- LLM API chips -->
  <rect x="736" y="130" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="816" y="151" text-anchor="middle" fill="white" font-size="13" font-weight="600">OpenRouter</text>
  <rect x="904" y="130" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="984" y="151" text-anchor="middle" fill="white" font-size="13" font-weight="600">Anthropic</text>
  <rect x="736" y="174" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="816" y="195" text-anchor="middle" fill="white" font-size="13" font-weight="600">OpenAI</text>
  <rect x="904" y="174" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="984" y="195" text-anchor="middle" fill="white" font-size="13" font-weight="600">Mistral</text>

  <!-- LLM Scraper chips -->
  <rect x="736" y="360" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="816" y="381" text-anchor="middle" fill="white" font-size="13" font-weight="600">ChatGPT</text>
  <rect x="904" y="360" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="984" y="381" text-anchor="middle" fill="white" font-size="13" font-weight="600">Google AI Mode</text>
  <rect x="736" y="404" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="816" y="425" text-anchor="middle" fill="white" font-size="13" font-weight="600">Perplexity</text>
  <rect x="904" y="404" width="160" height="32" rx="8" fill="url(#extGrad)" filter="url(#sh)"/>
  <text x="984" y="425" text-anchor="middle" fill="white" font-size="13" font-weight="600">Grok</text>
</svg>
